name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Setup Android NDK
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build EXE installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          $version = "${{ github.ref_name }}"
          iscc /DMyAppVersion=$version windows/installer/setup.iss

      - name: Upload Windows artifact (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows/TheArchivist-*-setup.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (64-bit only)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Rename APK with version
        run: |
          version="${{ github.ref_name }}"
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/TheArchivist-$version.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/TheArchivist-*.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/windows-build/TheArchivist-*-setup.exe
            artifacts/android-build/TheArchivist-*.apk
